name: API Deploy

on:
  push:
    branches: [develop]
    paths:
      - "api/**"
      - "api/Dockerfile.prod"
      - ".github/workflows/api-deploy.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: sightline
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: sightline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sightline -d sightline_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run Alembic migrations
        working-directory: db
        env:
          DATABASE_URL_SYNC: postgresql://sightline:testpass@localhost:5432/sightline_test
        run: alembic upgrade head

      - name: Run pytest
        working-directory: api
        env:
          DATABASE_URL: postgresql+asyncpg://sightline:testpass@localhost:5432/sightline_test
          ENVIRONMENT: test
          PYTHONPATH: .
        run: pytest tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/sightline-api:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/sightline-api:latest \
            -f api/Dockerfile.prod \
            ./api \
            --push

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/sightline-api:${{ github.sha }}

      - name: Smoke test
        run: |
          curl --fail --max-time 30 https://ca-sightline-api.wittywave-8fb8cdba.australiaeast.azurecontainerapps.io/health
