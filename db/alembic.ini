# Alembic configuration — placeholder
# Full configuration added when FastAPI app is initialised in Phase 2.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is set at runtime in env.py via DATABASE_URL_SYNC env var.
# Provide a fallback here for local development (Docker Compose default creds).
sqlalchemy.url = postgresql://sightline:localdevonly@localhost:5432/sightline

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
